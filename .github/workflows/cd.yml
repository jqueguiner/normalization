name: CD

on:
  push:
    tags:
      # PEP 440 versioning
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+a[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+b[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+rc[0-9]+

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for Trusted Publisher (OIDC) and Sigstore signing
      attestations: write # required to persist build attestations

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)?[0-9]*$ ]]; then
            echo "Error: Tag must follow PEP 440 versioning format (vMAJOR.MINOR.PATCH with optional pre-release suffix)"
            echo "Examples: v1.2.3, v1.2.3a1, v1.2.3b2, v1.2.3rc1"
            echo "Got: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: uv version ${{ steps.version.outputs.version }}

      - name: Build
        run: uv build

      - name: Attest build artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing automatic
